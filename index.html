<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Styleys India LLP — Pro Inventory v2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.0/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0eef8;color:#222;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4a2090,#9b59b6)}
.auth-box{background:#fff;border-radius:16px;padding:40px 36px;width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo span{background:linear-gradient(135deg,#6c3fc5,#9b59b6);color:#fff;font-weight:800;font-size:30px;letter-spacing:3px;padding:8px 24px;border-radius:10px}
.auth-title{font-size:18px;font-weight:700;color:#333;margin-bottom:6px;text-align:center}
.auth-sub{font-size:13px;color:#aaa;text-align:center;margin-bottom:24px}
.auth-tabs{display:flex;border-radius:8px;overflow:hidden;border:1.5px solid #e0d8f0;margin-bottom:20px}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:#999;background:#fafafa;border:none;transition:all 0.15s}
.auth-tab.active{background:#6c3fc5;color:#fff}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;color:#888;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
.fg input,.fg select{width:100%;padding:10px 13px;border-radius:8px;border:1.5px solid #e0d8f0;background:#fdfcff;color:#222;font-size:13px;transition:border 0.15s}
.fg input:focus,.fg select:focus{outline:none;border-color:#6c3fc5}
.btn-auth{width:100%;padding:12px;border-radius:8px;border:none;background:#6c3fc5;color:#fff;font-size:14px;font-weight:700;transition:background 0.15s}
.btn-auth:hover{background:#5a32a3}
.auth-err{color:#c0392b;font-size:12px;text-align:center;margin-top:10px;min-height:18px}
.auth-ok{color:#27ae60;font-size:12px;text-align:center;margin-top:10px;min-height:18px}

/* ── SETUP ── */
.setup-wrap{max-width:560px;margin:50px auto;background:#fff;border-radius:14px;padding:36px;box-shadow:0 4px 24px rgba(108,63,197,0.12)}
.setup-logo{text-align:center;margin-bottom:24px}
.setup-logo span{background:linear-gradient(135deg,#6c3fc5,#9b59b6);color:#fff;font-weight:800;font-size:28px;letter-spacing:2px;padding:8px 20px;border-radius:8px}
.sql-block{background:#1e1e2e;color:#a6e3a1;font-size:11px;padding:14px;border-radius:8px;overflow-x:auto;line-height:1.8;white-space:pre;margin:10px 0}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:#6c3fc5;color:#fff;border-radius:50%;font-size:11px;font-weight:700;margin-right:6px;flex-shrink:0}
.step-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:10px;font-size:13px;color:#555;line-height:1.6}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#6c3fc5,#9b59b6);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;box-shadow:0 2px 8px rgba(108,63,197,0.3)}
.hdr-logo{color:#fff;font-weight:800;font-size:22px;letter-spacing:2px}
.hdr-sub{color:rgba(255,255,255,0.75);font-size:11px;margin-left:8px}
.hdr-right{display:flex;align-items:center;gap:12px}
.user-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.15);border-radius:20px;padding:4px 12px 4px 6px}
.user-avatar{width:26px;height:26px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#6c3fc5}
.user-name{color:#fff;font-size:12px;font-weight:600}
.user-role{color:rgba(255,255,255,0.7);font-size:10px}
.btn-logout{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:4px 12px;border-radius:5px;font-size:12px}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:210px;background:#fff;border-right:1px solid #e8e0f5;flex-shrink:0;padding:16px 0;display:flex;flex-direction:column}
.sidebar-section{font-size:10px;color:#bbb;font-weight:700;letter-spacing:1px;padding:14px 20px 4px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:#666;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s}
.nav-item:hover{background:#f5f0ff;color:#6c3fc5}
.nav-item.active{background:#f0eaf9;color:#6c3fc5;font-weight:600;border-left:3px solid #6c3fc5}
.nav-item.disabled{opacity:0.35;pointer-events:none}
.nav-icon{font-size:16px;width:20px;text-align:center}
.main{flex:1;padding:24px;overflow-x:hidden}

/* ── METRICS ── */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.metric{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.metric-label{font-size:11px;color:#999;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.metric-value{font-size:24px;font-weight:700;color:#222}
.metric-value.purple{color:#6c3fc5}
.metric-value.red{color:#c0392b}
.metric-value.green{color:#27ae60}
.metric-value.orange{color:#e67e22}
.metric-sub{font-size:11px;color:#aaa;margin-top:3px}
.page-title{font-size:18px;font-weight:700;color:#333;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.07);margin-bottom:20px}
.card-title{font-size:14px;font-weight:700;color:#444;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.tbl-wrap{overflow-x:auto;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:11px 13px;text-align:left;font-weight:600;color:#888;background:#fafafa;white-space:nowrap;border-bottom:1px solid #f0f0f0}
td{padding:10px 13px;border-bottom:1px solid #f7f7f7;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fdf9ff}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.btn{padding:8px 18px;border-radius:7px;border:none;font-size:13px;font-weight:600;transition:all 0.15s}
.btn-primary{background:#6c3fc5;color:#fff}
.btn-primary:hover{background:#5a32a3}
.btn-success{background:#27ae60;color:#fff}
.btn-danger{background:#fdecea;color:#c0392b;border:1px solid #f5c6c6}
.btn-secondary{background:#f5f0ff;color:#6c3fc5;border:1px solid #d4c5f0}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:5px}
.btn-outline{background:#fff;color:#6c3fc5;border:1.5px solid #6c3fc5}
.btn-print{background:#6c3fc5;color:#fff;padding:5px 14px;border-radius:5px;border:none;font-size:12px;font-weight:600}
.btn-challan{background:#1abc9c;color:#fff;padding:5px 14px;border-radius:5px;border:none;font-size:12px;font-weight:600}
.search-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-input{flex:1;min-width:200px;padding:9px 14px;border-radius:8px;border:1.5px solid #e0d8f0;background:#fff;font-size:13px}
.search-input:focus{outline:none;border-color:#6c3fc5}
.badge{padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600}
.badge-ok{background:#e8f8ef;color:#1e8449}
.badge-low{background:#fdecea;color:#c0392b}
.badge-out{background:#fdf2e9;color:#d35400}
